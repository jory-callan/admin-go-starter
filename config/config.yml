# ======================
# 日志配置
# ======================
log:
  level: "info"       # debug, info, warn, error
  format: "json"      # json, text
  output: "stdout"    # stdout 或文件路径

# ======================
# HTTP 服务配置
# ======================
http:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"

# ======================
# 数据库配置 (支持多实例)
# ======================
database:
  default:
    driver: "sqlite"
    dsn: "demo.sqlite.db"
    max_open_conns: 50
    max_idle_conns: 10
    conn_max_lifetime: 1800  # 秒
    conn_max_idle_time: 300  # 秒
    log_level: "warn"

# ======================
# Redis 配置 (支持多实例)
# ======================
redis:
  default:
    addr: "localhost:6379"
    password: ""
    db: 0
    pool_size: 100
    min_idle_conns: 10

# ======================
# JWT 配置
# ======================
jwt:
  secret: "your-secret-key-change-in-production"
  expires: "24h"
  issuer: "aicode"
