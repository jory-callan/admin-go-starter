# ======================
# 基础日志配置
# ======================
log:
  level: "info"
  format: "json"
  output: "stdout"

# ======================
# HTTP 服务配置
# ======================
http:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"

# ======================
# 数据库配置
# ======================
database:
  driver: "sqlite"
  dsn: "demo.sqlite.db"
  max_open_conns: 50
  max_idle_conns: 10

# ======================
# Redis 配置
# ======================
redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 100

# ======================
# JWT 配置
# ======================
jwt:
  secret: "your-secret-key-change-in-production"
  expires: "24h"
  issuer: "aicode"
